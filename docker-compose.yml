version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    
  kafka:
    image: apache/kafka:3.7.2
    container_name: kafka_container
    ports:
      - "9092:9092"


volumes:
  mongo-data:
