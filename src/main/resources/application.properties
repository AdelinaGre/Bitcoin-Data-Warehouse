spring.mongodb.uri=mongodb://admin:password@localhost:27017/datawarehouse?authSource=admin
spring.application.name=datawarehouse
marketdata.api.base-url=https://data.nasdaq.com/api/v3
marketdata.api.key=${NASDAQ_DATA_LINK_API_KEY:}
marketdata.api.database-code=QDL
marketdata.api.table-code=BITFINEX
marketdata.api.code=ZRXUSD
marketdata.alphavantage.base-url=https://www.alphavantage.co
marketdata.alphavantage.api-key=${ALPHAVANTAGE_API_KEY:}
marketdata.alphavantage.output-size=compact
server.port=8081

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=datawarehouse-ingestion
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.datawarehouse.datawarehouse.*

app.kafka.topics.ingestion-requests=marketdata.ingestion.requests
app.kafka.topics.ingestion-results=marketdata.ingestion.results

app.kafka.topics.dead-letter=marketdata.dead-letter
app.kafka.topics.marketdata-raw=marketdata.raw
streaming.binance.enabled=false
streaming.binance.symbols=btcusdt,ethusdt
streaming.binance.interval=1m
